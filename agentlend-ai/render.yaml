services:
  - type: web
    name: agentlend-backend
    env: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: agentlend-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_BEDROCK_MODEL_ID
        value: amazon.nova-lite-v1:0
      - key: WDK_API_KEY
        sync: false
      - key: WDK_BASE_URL
        value: https://api.wdk.tether.to/v1
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: ETHERSCAN_BASE_URL
        value: https://api-sepolia.etherscan.io/api
      - key: CHAIN_ID
        value: "11155111"
      - key: TREASURY_WALLET_ADDRESS
        sync: false
      - key: TREASURY_PRIVATE_KEY
        sync: false
      - key: TOKEN_CONTRACT_ADDRESS
        sync: false
      - key: TOKEN_DECIMALS
        value: "6"
      - key: AGENT_LOOP_INTERVAL_SECONDS
        value: "120"
      - key: REPAYMENT_MONITOR_INTERVAL_SECONDS
        value: "60"
      - key: MAX_LOAN_AMOUNT
        value: "1000"
      - key: MIN_LOAN_AMOUNT
        value: "10"
      - key: DEFAULT_LOAN_DURATION_DAYS
        value: "30"

databases:
  - name: agentlend-db
    databaseName: agentlend
    user: agentlend
